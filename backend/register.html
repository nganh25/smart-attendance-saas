<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ĐĂNG KÝ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-6 rounded-2xl shadow-md border space-y-4">
        <h2 class="text-xl font-bold text-slate-800 text-center border-b pb-3">📝 ĐĂNG KÝ</h2>
        
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Mã Công Ty (Tenant ID)</label>
                <input id="regTenant" type="text" placeholder="Ví dụ: 123" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tài Khoản (User ID)</label>
                <input id="regUser" type="text" placeholder="Ví dụ: nv001" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Họ Và Tên</label>
                <input id="regName" type="text" placeholder="Ví dụ: Nguyễn Văn A" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Mật Khẩu</label>
                <input id="regPass" type="password" placeholder="••••••••" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Email</label>
                <input id="regEmail" type="email" placeholder="example@gmail.com" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Số Điện Thoại</label>
                <input id="regPhone" type="text" placeholder="0912345678" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>

            <div class="bg-slate-50 p-3 rounded-xl border">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">VUI LÒNG CHỌN PHƯƠNG THỨC NHẬN MÃ OTP</label>
                <div class="flex gap-6">
                    <label class="text-xs font-medium text-slate-700 cursor-pointer flex items-center gap-1.5">
                        <input type="radio" name="otpType" value="EMAIL" checked class="text-indigo-600 focus:ring-indigo-500"> 📧 Qua Email
                    </label>
                    <label class="text-xs font-medium text-slate-700 cursor-pointer flex items-center gap-1.5">
                        <input type="radio" name="otpType" value="PHONE" class="text-indigo-600 focus:ring-indigo-500"> 📱 Qua Số điện thoại
                    </label>
                </div>
            </div>
        </div>

        <button onclick="requestRegister()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition text-sm shadow-sm">
            NHẬN MÃ XÁC THỰC
        </button>
    </div>

    <div id="otpModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-xl">
            <div class="text-center">
                <h3 class="text-lg font-bold text-slate-800">🔒 Xác Thực OTP</h3>
                <p class="text-xs text-slate-500 mt-1">Vui lòng kiểm tra phương thức đã chọn để lấy mã xác thực gồm 6 chữ số.</p>
            </div>
            <div>
                <input id="inputOtp" type="text" maxlength="6" placeholder="******" class="w-full px-3 py-3 border text-center tracking-[0.5em] font-mono text-xl rounded-xl focus:outline-none focus:border-indigo-500">
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-2 rounded-xl text-sm transition">Hủy</button>
                <button onclick="verifyRegister()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-xl text-sm transition shadow-sm">XÁC THỰC</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:3000";

        async function requestRegister() {
            const tenantId = document.getElementById('regTenant').value.trim();
            const userId = document.getElementById('regUser').value.trim();
            const fullName = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPass').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const otpType = document.querySelector('input[name="otpType"]:checked').value;

            if (!tenantId || !userId || !password || !email || !phone) {
                alert("Vui lòng điền đầy đủ thông tin!");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/register/request`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tenantId, userId, password, fullName, email, phone, otpType })
                });
                const data = await res.json();
                alert(data.message);

                if (res.ok) {
                    document.getElementById('otpModal').classList.remove('hidden');
                }
            } catch (error) {
                alert("Không thể kết nối đến máy chủ backend!");
            }
        }

        async function verifyRegister() {
            const tenantId = document.getElementById('regTenant').value.trim();
            const userId = document.getElementById('regUser').value.trim();
            const otpCode = document.getElementById('inputOtp').value.trim();

            if (otpCode.length !== 6) {
                alert("Mã OTP phải có độ dài đúng 6 số!");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/register/verify`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tenantId, userId, otpCode })
                });
                const data = await res.json();
                alert(data.message);

                if (res.ok) {
                    closeModal();
                    window.location.href = "login.html"; 
                }
            } catch (error) {
                alert("Lỗi kết nối máy chủ!");
            }
        }

        function closeModal() {
            document.getElementById('otpModal').classList.add('hidden');
            document.getElementById('inputOtp').value = "";
        }
    </script>
</body>
</html>
