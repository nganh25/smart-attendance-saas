AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart Attendance SaaS - Ha tang Serverless co ban

Resources:

  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/                  
      Handler: app.handler           
      Runtime: nodejs20.x            
      Timeout: 10                    
      Events:
        
        HelloWorldAPI:
          Type: Api
          Properties:
            Path: /hello             
            Method: get              