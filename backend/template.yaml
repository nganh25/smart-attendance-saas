  #             - HEAD
  #             - OPTIONS
  #             - PUT
  #             - POST
  #             - PATCH
  #             - DELETE
  #           CachedMethods:
  #             - GET
  #             - HEAD
  #           ForwardedValues:
  #             QueryString: true
  #             Headers:
  #               - Authorization
  #               - Content-Type
