  #         CloudFrontDefaultCertificate: true
  # 
  # # ─── S3 SPA Bucket Policy (OAC Access Only) ───
  # SpaBucketPolicy:
  #   Type: AWS::S3::BucketPolicy
  #   Properties:
  #     Bucket: !Ref SpaBucket
  #     PolicyDocument:
  #       Version: '2012-10-17'
  #       Statement:
  #         - Sid: AllowCloudFrontOACRead
  #           Effect: Allow
  #           Principal:
