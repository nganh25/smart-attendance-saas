  #           Condition:
  #             StringEquals:
  #               'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SpaDistribution}'

  # ─── Functions ───
  CheckInFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler/attendance/checkin.handler
      Runtime: nodejs18.x
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref SaaSAttendanceTable
          # ORIGIN_VERIFY_SECRET: !Ref OriginVerifySecret
      Events:
        CheckInApi:
          Type: HttpApi
          Properties:
            Path: /attendance/check-in
            Method: post
            ApiId: !Ref AttendanceApi
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt SaaSAttendanceTable.Arn

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler/profile/update.handler
      Runtime: nodejs18.x
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref SaaSAttendanceTable
          # ORIGIN_VERIFY_SECRET: !Ref OriginVerifySecret
      Events:
        UpdateApi:
          Type: HttpApi
          Properties:
            Path: /profile/update
            Method: patch
            ApiId: !Ref AttendanceApi
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt SaaSAttendanceTable.Arn

  ExportReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler/reports/export.handler
      Runtime: nodejs18.x
      Timeout: 300
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref SaaSAttendanceTable
          REPORT_BUCKET: !Ref SaaSReportBucket
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt ReportQueue.Arn
            BatchSize: 1
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt SaaSAttendanceTable.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub 'arn:aws:s3:::${SaaSReportBucket}/*'

  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler/hello.handler
      Runtime: nodejs20.x
      Timeout: 10
      Tracing: Active
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*'
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        HelloWorldAPI:
          Type: HttpApi
          Properties:
            ApiId: !Ref AttendanceApi
            Path: /hello
            Method: get

Outputs:
  AttendanceApiUrl:
    Description: "Link API Endpoint"
    Value: !Sub "https://${AttendanceApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
